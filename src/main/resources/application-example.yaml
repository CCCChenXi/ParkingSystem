spring:
  application:
    name: ParkingSystem

  # ====================== Mysql ======================
  datasource:
    url: jdbc:mysql://localhost:3306/parking_system?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=utf-8
    username: root
    password: ${MYSQL_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  # ====================== Redis配置 ======================
  data:
    redis:
      host: localhost
      port: 6379
      # password: ${REDIS_PASSWORD:}
      database: 0
      lettuce:
        pool:
          enabled: true
          max-active: 8
          max-idle: 8
          min-idle: 0

  # ====================== RabbitMQ配置 ======================
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: 5672
    username: ${RABBITMQ_USER}
    password: ${RABBITMQ_PASSWORD}
    virtual-host: /

# ====================== 服务器配置 ======================
server:
  port: 8080

# ====================== JWT配置 ======================
jwt:
  secret: ${JWT_SECRET}
  expiration: 86400000

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
