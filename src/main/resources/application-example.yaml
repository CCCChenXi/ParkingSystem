spring:
  application:
    name: ParkingSystem

  # ====================== Mysql ======================
  datasource:
    url: jdbc:mysql://localhost:3306/parking_system?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=utf-8
    username: root
    password: ${MYSQL_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 50
      minimum-idle: 5
      connection-timeout: 10000

  # ====================== Redis配置 ======================
  data:
    redis:
      host: localhost
      port: 6379
      # password: ${REDIS_PASSWORD:}
      database: 0
      lettuce:
        pool:
          enabled: true
          max-active: 32
          max-idle: 16
          min-idle: 4

  # ====================== RabbitMQ配置 ======================
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: 5672
    username: ${RABBITMQ_USER}
    password: ${RABBITMQ_PASSWORD}
    virtual-host: /

# ====================== 服务器配置 ======================
server:
  port: 8080
  tomcat:
    accept-count: 200
    threads:
      max: 400
      min-spare: 20

# ====================== JWT配置 ======================
jwt:
  secret: ${JWT_SECRET}
  expiration: 86400000

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
